<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lesson 11 | Bootstrap Form Controls</title>
    <!-- STEP 1: Attach the Boostrap CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<!-- STEP 3: Style the BODY background -->
<body class="bg-light">
<!-- STEP 4: Add a page layout container with top and bottom margins -->
<div class="container my-5">
    <!-- STEP 5: Let's use the Bootstrap Grid Layout system - add a row -->
    <div class="row justify-content-center">
        <!-- STEP 6: Now add a column, full width for small screens, a bit narrowor for medium and bigger - plus some other visual refinements -->
        <div class="col-sm-12 col-md-8 col-lg-6 bg-white rounded shadow-sm p-4">
            <!-- STEP 7: Add an H2, with a bigger bottom margin class -->
            <h2 class="mb-4">Bootstrap Form Controls</h2>
            <form action="" method="" id="">
                <!-- STEP 8: Construct a text INPUT for full name with appropriate classes -->
                <label class="form-label">Full Name
                    <input type="text" class="form-control mb-3" placeholder="Full Name" id="fullName">
                </label>
                <!-- STEP 9: Build out a new row containing 2 columns -->
                <div class="row mb-3">
                    <!-- STEP 10: Build an Input for email with LABEL (and a note) -->
                    <div class="col-sm-12 col-md-6">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="email" placeholder="name@example.com">
                        <div class="form-text">We'll never share your email with anyone else.</div>
                    </div>
                    <!-- STEP 11: Build an INPUT for password with LABEL -->
                    <div class="col-sm-12 col-md-6">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" placeholder="Password">
                    </div>
                </div>
                <!-- STEP 12: Create a SELECT element with LABEL -->
                <div class="mb-3">
                    <label for="country" class="form-label">Favorite Coding Language</label>
                    <select class="form-select form-select-sm" id="country">
                        <option selected>Select your favorite coding language</option>
                        <option value="1">JavaScript</option>
                        <option value="2">Python</option>
                        <option value="3">Java</option>
                        <option value="4">C#</option>
                    </select>
                </div>
                <!-- STEP 13: Create a TEXTAREA element with LABEL -->
                <div class="mb-3">
                    <label for="bio" class="form-label">Bio</label>
                    <textarea class="form-control" id="bio" rows="3" placeholder="Tell us about yourself"></textarea>
                </div>
                <!-- STEP 14: Build out an INPUT with add-ons for donation amount -->
                <label for="donation" class="form-label">Donation Amount</label>
                <div class="input-group mb-3">
                    <span class="input-group-text">
                        <select class="form-select form-select-sm" id="currency">
                            <option value="USD" selected>$</option>
                            <option value="EUR">EUR</option>
                            <option value="GBP">GBP</option>
                        </select>
                    </span>
                    <input type="number" class="form-control" id="donation" placeholder="Amount">
                    <span class="input-group-text">.00</span>
                </div>
                <!-- STEP 15: Insert a DIV for a collection of input elements, with a LABEL -->
                <div class="mb-3 d-block">
                    <label class="form-label">Preferences</label>
                    <!-- STEP 16: Build a checkbox -->
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="subscribe" id="contactEmail">
                        <label class="form-check-label" for="contactEmail">
                            Subscribe to newsletter
                        </label>
                    </div>
                    <!-- STEP 17a: Build a radio button -->
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="contactMethod" value="darkMode" id="contactPhone">
                        <label class="form-check-label" for="contactPhone">
                            Dark mode
                        </label>
                    </div>
                    <!-- STEP 17b: Add another radio button -->
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="contactMethod" value="lightMode" id="contactMail" checked >
                        <label class="form-check-label" for="contactMail">
                            Light mode
                        </label>
                    </div>
                </div>
                <!-- STEP 18: Build a toggle switch button -->
                <div class="mb-3">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="notifications" role="switch">
                        <label class="form-check-label" for="notifications">Enable notifications</label>
                    </div>
                </div>
                <!-- STEP 19: Assemble a range slider -->
                <div class="mb-3">
                    <label for="volume" class="form-label">Volume</label>
                    <input type="range" class="form-control-range w-100" id="volume" min="0" max="100" step="5"> 
                </div>
                <!-- STEP 20: Craft a file upload widget -->
                <div class="mb-4">
                    <label for="formFile" class="form-label">Upload Profile Picture</label>
                    <input class="form-control" type="file" id="formFile">
                </div>
                <!-- STEP 21: Complete the form with a submit BUTTON element -->
                <button type="submit" class="btn btn-primary">Submit</button>
            </form>
        </div>
    </div>
</div>
<!-- STEP 2: Attach the Bootstrap JS libraries via CDN as well -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
